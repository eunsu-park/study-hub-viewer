{% extends "base.html" %}

{% block title %}Search - Study Materials{% endblock %}

{% block header %}
<h1>Search</h1>
{% endblock %}

{% block content %}
<div class="search-page">
    <form class="search-form" id="search-page-form" onsubmit="return false;">
        <input type="search" id="search-input" placeholder="Search lessons..." autofocus autocomplete="off" aria-label="Search lessons">
        <button type="submit">Search</button>
    </form>

    <div id="search-results">
        <div class="search-hint">
            <p>Enter a search term to find lessons across all topics.</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ base_url }}/static/js/lunr.min.js"></script>
<script src="{{ base_url }}/static/js/search.js"></script>
<script>
    initSearch('{{ lang }}', '{{ base_url }}');
</script>
{% endblock %}
