<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Study Materials{% endblock %}</title>
    <link rel="stylesheet" href="{{ base_url }}/static/css/style.css">
    <link rel="stylesheet" href="{{ base_url }}/static/css/highlight.css">
    <!-- KaTeX for LaTeX math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });"></script>
    <script>
        (function(){
            var t = localStorage.getItem('theme');
            if (!t) { t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="{{ base_url }}/{{ lang }}/" class="logo">Study Materials</a>
                <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                    <span></span>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="{{ base_url }}/{{ lang }}/" class="nav-item {% if page_type == 'index' %}active{% endif %}">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Home</span>
                </a>
                <a href="{{ base_url }}/{{ lang }}/paths/" class="nav-item {% if page_type == 'paths' %}active{% endif %}">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Paths</span>
                </a>
                <a href="{{ base_url }}/{{ lang }}/graph/" class="nav-item {% if page_type == 'graph' %}active{% endif %}">
                    <span class="nav-icon">🔗</span>
                    <span class="nav-text">Graph</span>
                </a>
                <a href="{{ base_url }}/examples/" class="nav-item {% if page_type == 'examples' %}active{% endif %}">
                    <span class="nav-icon">💻</span>
                    <span class="nav-text">Examples</span>
                </a>
            </nav>

            <div class="sidebar-search">
                <form action="{{ base_url }}/{{ lang }}/search.html" method="get" id="search-form">
                    <input type="search" name="q" placeholder="Search..." id="search-sidebar-input">
                </form>
            </div>

            <!-- Language Selector -->
            <div class="sidebar-lang">
                <select id="lang-select" class="lang-selector" onchange="switchLanguage(this.value)">
                    {% for language in languages %}
                    <option value="{{ language.code }}" {% if language.code == lang %}selected{% endif %}>
                        {{ language.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="sidebar-footer">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon light">☀️</span>
                    <span class="theme-icon dark">🌙</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">
                    <span></span>
                </button>
                {% block header %}{% endblock %}
            </header>

            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ base_url }}/static/js/app.js"></script>
    <script>
        function switchLanguage(newLang) {
            const path = window.location.pathname;
            const base = '{{ base_url }}';
            const currentLang = '{{ lang }}';
            const newPath = path.replace(base + '/' + currentLang + '/', base + '/' + newLang + '/');
            window.location.href = newPath + window.location.search;
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
